networks:
    sqlgateway:
      external: true
      name:  sqlgateway   
      
services:
    mysql:
      image: mysql
      container_name: mysql
      hostname: mysql
      restart: always
      environment:
        MYSQL_DATABASE: 'db'
        # you don't have to use root, but you can if you like
        MYSQL_USER: 'user'
        # You can use whatever password you like
        MYSQL_PASSWORD: 'password'
        # Password for root access
        MYSQL_ROOT_PASSWORD: 'password'
      ports:
        - 3306:3306
      volumes:
        - ./my-db:/var/lib/mysql
        # copy the sql script to create tables
        - ./mysql/create_tables.sql:/docker-entrypoint-initdb.d/create_tables.sql   
      networks:
        - sqlgateway
  
