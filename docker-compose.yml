networks:
    sqlgateway:
      external: true
      name:  sqlgateway   
      
services:
    db2:
      image: ibmcom/db2:11.5.8.0
      hostname: db2
      container_name: db2
      privileged: true
      ports:
        - 50000:50000
      environment:
        - DB2INST1_PASSWORD=password
        - LICENSE=accept
        - DBNAME=sample
        - SAMPLEDB=true
      volumes:
        - ./db2_data:/database  
      networks:
        - sqlgateway        