services:
    iris:
      build:
        context: .
        dockerfile: Dockerfile
      restart: always
      container_name: iris1
      hostname: iris
      ports:
        - 41773:1972
        - 42773:52773
      volumes:
        - ./:/home/irisowner/dev
        - ./jdbc:/opt/irisbuild/jdbc
        - ./iris1:/opt/irisbuild/demo
    
    iris2: 
      build:
        context: .
        dockerfile: Dockerfile
      restart: always
      container_name: iris2
      hostname: iris2
      ports:
        - 1972:1972
        - 52773:52773
      volumes:
        - ./:/home/irisowner/dev
        - ./iris2:/opt/irisbuild/demo
